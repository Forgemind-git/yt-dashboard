services:
  yt-backend:
    build: ./backend
    container_name: yt-backend
    restart: unless-stopped
    env_file: .env
    environment:
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yt-backend.rule=Host(`yt.srv879786.hstgr.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.yt-backend.entrypoints=web,websecure"
      - "traefik.http.routers.yt-backend.tls=true"
      - "traefik.http.routers.yt-backend.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.yt-backend.priority=10"
      - "traefik.http.services.yt-backend.loadbalancer.server.port=3001"

  yt-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: yt-frontend
    restart: unless-stopped
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yt-frontend.rule=Host(`yt.srv879786.hstgr.cloud`)"
      - "traefik.http.routers.yt-frontend.entrypoints=web,websecure"
      - "traefik.http.routers.yt-frontend.tls=true"
      - "traefik.http.routers.yt-frontend.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.yt-frontend.priority=1"
      - "traefik.http.services.yt-frontend.loadbalancer.server.port=80"

networks:
  root_default:
    external: true
